services:
  # FireFeed Telegram Bot
  firefeed-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: firefeed-telegram-bot
    restart: unless-stopped
    environment:
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: null
      REDIS_SOCKET_TIMEOUT: 5
      REDIS_SOCKET_CONNECT_TIMEOUT: 5
      REDIS_SOCKET_KEEPALIVE: true
      
      # Telegram Configuration
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      TELEGRAM_WEBHOOK_PORT: 8443
      TELEGRAM_WEBHOOK_HOST: 0.0.0.0
      TELEGRAM_USE_WEBHOOK: ${TELEGRAM_USE_WEBHOOK:-false}
      TELEGRAM_POLLING_TIMEOUT: 20
      TELEGRAM_ALLOWED_UPDATES: null
      TELEGRAM_RATE_LIMIT_REQUESTS: 30
      TELEGRAM_RATE_LIMIT_WINDOW: 60
      
      # FireFeed API Configuration
      FIREFEED_API_BASE_URL: ${FIREFEED_API_BASE_URL:-http://host.docker.internal:8001}
      FIREFEED_API_KEY: ${FIREFEED_API_KEY}
      FIREFEED_API_TIMEOUT: 30
      FIREFEED_API_MAX_RETRIES: 3
      FIREFEED_API_RETRY_DELAY: 1.0
      
      # Translation Configuration
      TRANSLATION_ENABLED: ${TRANSLATION_ENABLED:-true}
      TRANSLATION_DEFAULT_LANGUAGE: ${TRANSLATION_DEFAULT_LANGUAGE:-en}
      TRANSLATION_SUPPORTED_LANGUAGES: en,ru,de
      TRANSLATION_MAX_TEXT_LENGTH: 5000
      TRANSLATION_CACHE_TTL: 3600
      
      # Cache Configuration
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_DEFAULT_TTL: 300
      CACHE_MAX_SIZE: 1000
      CACHE_CLEANUP_INTERVAL: 300
      
      # Security Configuration
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: null
      CORS_ORIGINS: null
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 60
      
      # Monitoring Configuration
      MONITORING_ENABLED: ${MONITORING_ENABLED:-true}
      METRICS_PORT: 8080
      HEALTH_CHECK_PORT: 8081
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
    
    ports:
      - "8080:8080"  # Metrics port
      - "8081:8081"  # Health check port
    
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    
    depends_on:
      redis:
        condition: service_healthy
    
    networks:
      - firefeed-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: firefeed-telegram-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass null
    
    volumes:
      - redis_data:/data
    
    ports:
      - "6379:6379"
    
    networks:
      - firefeed-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus (Optional - for monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: firefeed-telegram-bot-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    
    ports:
      - "9090:9090"
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    
    networks:
      - firefeed-network
    
    depends_on:
      - firefeed-telegram-bot
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana (Optional - for dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: firefeed-telegram-bot-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    
    ports:
      - "3000:3000"
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    
    networks:
      - firefeed-network
    
    depends_on:
      - prometheus
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  firefeed-network:
    driver: bridge